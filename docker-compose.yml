version: '3.8'

services:
  postgres:
    image: postgis/postgis:17-3.5
    container_name: tradeapp-postgres
    environment:
      POSTGRES_USER: tradeapp
      POSTGRES_PASSWORD: tradeapp
      POSTGRES_DB: tradeapp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./packages/backend/src/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradeapp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
